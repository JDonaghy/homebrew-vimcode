name: Update formulas on new release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.8)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA256
        id: sha
        run: |
          URL="https://github.com/JDonaghy/vimcode/archive/refs/tags/v${{ inputs.version }}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Computed SHA256: $SHA"

      - name: Update formulas
        run: |
          VERSION="${{ inputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          for formula in Formula/vimcode.rb Formula/vcd.rb; do
            sed -i "s|url \".*\"|url \"https://github.com/JDonaghy/vimcode/archive/refs/tags/v${VERSION}.tar.gz\"|" "$formula"
            sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$formula"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update formulas to v${{ inputs.version }}"
          git push
