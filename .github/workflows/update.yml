name: Update formulas on new release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.5.0)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA256 from release binaries
        id: sha
        run: |
          VERSION="${{ inputs.version }}"
          VIMCODE_SHA=$(curl -sL "https://github.com/JDonaghy/vimcode/releases/download/v${VERSION}/vimcode-macos-arm64.tar.gz" | sha256sum | cut -d' ' -f1)
          VCD_SHA=$(curl -sL "https://github.com/JDonaghy/vimcode/releases/download/v${VERSION}/vcd-macos-arm64.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "vimcode_sha=$VIMCODE_SHA" >> "$GITHUB_OUTPUT"
          echo "vcd_sha=$VCD_SHA" >> "$GITHUB_OUTPUT"
          echo "Computed vimcode SHA256: $VIMCODE_SHA"
          echo "Computed vcd SHA256: $VCD_SHA"

      - name: Update formulas
        run: |
          VERSION="${{ inputs.version }}"
          VIMCODE_SHA="${{ steps.sha.outputs.vimcode_sha }}"
          VCD_SHA="${{ steps.sha.outputs.vcd_sha }}"

          # vimcode formula
          sed -i "s|url \".*\"|url \"https://github.com/JDonaghy/vimcode/releases/download/v${VERSION}/vimcode-macos-arm64.tar.gz\"|" Formula/vimcode.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/vimcode.rb
          sed -i "s|sha256 \".*\"|sha256 \"${VIMCODE_SHA}\"|" Formula/vimcode.rb

          # vcd formula
          sed -i "s|url \".*\"|url \"https://github.com/JDonaghy/vimcode/releases/download/v${VERSION}/vcd-macos-arm64.tar.gz\"|" Formula/vcd.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/vcd.rb
          sed -i "s|sha256 \".*\"|sha256 \"${VCD_SHA}\"|" Formula/vcd.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update formulas to v${{ inputs.version }}"
          git push
